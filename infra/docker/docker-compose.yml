services:
  postgres:
    image: postgres:16-alpine
    container_name: raquel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: raquel
      POSTGRES_PASSWORD: raquel_dev_password
      POSTGRES_DB: raquel_dev
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raquel -d raquel_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: raquel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: raquel-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@raquel.local
      PGADMIN_DEFAULT_PASSWORD: raquel_dev
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - ./data/pgadmin:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  ml-service:
    build:
      context: ../../services/ml-service
      dockerfile: Dockerfile
    container_name: raquel-ml-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://raquel:raquel_dev_password@postgres:5432/raquel_dev
      ML_SERVICE_API_KEY: dev-internal-key
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../services/ml-service/app/models/trained:/app/app/models/trained
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
